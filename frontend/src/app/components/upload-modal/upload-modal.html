<div class="modal-overlay" (click)="close.emit()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>📤 Upload Template</h3>
      <button class="close-btn" (click)="close.emit()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Template Name</label>
        <input type="text" [(ngModel)]="templateName" placeholder="e.g., NDA Agreement" />
      </div>
      <div class="form-group">
        <label>Template Type</label>
        <div class="type-buttons">
          <button class="type-btn" [class.active]="templateType() === 'docx'" (click)="templateType.set('docx')">📄 DOCX</button>
          <button class="type-btn" [class.active]="templateType() === 'html'" (click)="templateType.set('html')">🌐 HTML</button>
        </div>
      </div>
      <div class="form-group">
        <label>File</label>
        <div class="drop-zone" (click)="fileInput.click()" (drop)="onDrop($event)" (dragover)="onDragOver($event)">
          <input type="file" #fileInput style="display:none" (change)="onFileSelected($event)" accept=".docx,.html" />
          <div class="drop-content">
            <span class="drop-icon">📁</span>
            <p>{{ selectedFile ? selectedFile.name : 'Click or drag & drop' }}</p>
            <small>Accepts .docx or .html files</small>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" (click)="close.emit()">Cancel</button>
      <button class="btn-upload" (click)="upload()" [disabled]="uploading()">{{ uploading() ? 'Uploading...' : 'Upload' }}</button>
    </div>
  </div>
</div>
