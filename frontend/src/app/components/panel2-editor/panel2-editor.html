<div class="panel">
  <div class="panel-header">
    <div class="panel-title">
      <div class="dot active"></div>
      HTML Editor
    </div>
  </div>
  <div class="panel-body">
    <div class="editor-wrap">
      <div class="line-numbers">
        @for (num of lineNumbers(); track num) {
          <span>{{ num }}</span>
        }
      </div>
      <textarea #editor class="editor-textarea" [(ngModel)]="editorContent" (ngModelChange)="onContentChange()" placeholder="Edit your template here..."></textarea>
    </div>
    @if (placeholders().length > 0) {
      <div class="placeholder-bar">
        <span class="ph-label">Placeholders:</span>
        @for (ph of placeholders(); track ph) {
          <span class="ph-tag">{{ ph }}</span>
        }
      </div>
    }
  </div>
</div>
