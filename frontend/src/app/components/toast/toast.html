<div class="toasts">
  @for (toast of toastService.getToasts()(); track toast.id) {
    <div class="toast" [class]="toast.type">
      <span class="toast-ic">{{ toast.type === 'success' ? '✓' : toast.type === 'error' ? '✕' : toast.type === 'warn' ? '⚠' : '◆' }}</span>
      <span>{{ toast.message }}</span>
    </div>
  }
</div>
