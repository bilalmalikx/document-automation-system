<div class="panel panel1">
  <div class="line-nums">
    <div *ngFor="let num of lineNumbers()" class="line-num">{{ num }}</div>
  </div>
  <textarea class="code-area" [value]="content()" readonly spellcheck="false" placeholder="// Select a template to view source"></textarea>
  <div class="panel-empty" [class.hidden]="content()">
    <div class="empty-icon">📄</div>
    <div class="empty-txt">No template selected</div>
  </div>
</div>
