<div class="app">
  <app-header (templateSelected)="onTemplateSelected($event)" />
  
  <div class="panels">
    <app-panel1-current [content]="content()" />
    <app-panel2-editor 
      [content]="editorContent()"
      (contentChange)="onEditorChange($event)"
      (placeholdersChange)="onPlaceholdersChange($event)" />
    <app-panel3-preview 
      [content]="editorContent()"
      [placeholders]="placeholders()" />
  </div>
  
  <div class="bottom-bar">
    <div class="stats">
      {{ charCount() }} chars · {{ lineCount() }} lines · {{ placeholders().length }} placeholders
    </div>
    <div class="actions">
      <button class="btn-refresh" (click)="refreshPreview()">↻ Refresh Preview</button>
      <button class="btn-save" (click)="saveChanges()" [disabled]="saving()">
        {{ saving() ? 'Saving...' : '💾 Save Changes' }}
      </button>
      <button class="btn-generate" (click)="openGenerateModal()">
        ⚡ Generate Document
      </button>
    </div>
  </div>
  
  <app-toast />
  @if (showGenerateModal()) {
    <app-generate-modal 
      [templateId]="templateId()"
      [placeholders]="placeholders()"
      (close)="closeGenerateModal()" />
  }
</div>
